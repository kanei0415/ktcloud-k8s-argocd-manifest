image:
  repository: kanei0415/ktcloud-msa-frontend
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 2

containerPort: 80

service:
  type: ClusterIP
  port: 80

# Injected into the SPA at runtime via a ConfigMap mounted at
# /usr/share/nginx/html/config.js. Keys land on window.__APP_CONFIG__.
runtimeConfig:
  API_GATEWAY_ENDPOINT: /ktcloud-msa/user-api/api/v1
