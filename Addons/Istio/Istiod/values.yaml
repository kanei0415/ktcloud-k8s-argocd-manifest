istiod:
  global:
    istioNamespace: istio-system
    proxy:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 256Mi
    proxy_init:
      resources:
        requests:
          cpu: 10m
          memory: 40Mi
        limits:
          cpu: 100m
          memory: 128Mi

  pilot:
    autoscaleEnabled: true
    autoscaleMin: 1
    autoscaleMax: 3
    replicaCount: 1
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1024Mi

  meshConfig:
    accessLogFile: /dev/stdout
    enableTracing: true
    defaultConfig:
      proxyMetadata: {}
      tracing:
        # Demo samples 100% so every request is traceable (and any P99-breach
        # request can be inspected immediately). Lower to ~1-5% in production.
        sampling: 100.0
    outboundTrafficPolicy:
      mode: ALLOW_ANY
    # Wire the Envoy sidecars' distributed tracing to the Jaeger all-in-one
    # (Addons/Jaeger) over the Zipkin-compatible collector port.
    extensionProviders:
      - name: jaeger
        zipkin:
          service: jaeger-collector.istio-system.svc.cluster.local
          port: 9411
    defaultProviders:
      tracing:
        - jaeger
