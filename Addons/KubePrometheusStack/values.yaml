kube-prometheus-stack:
  fullnameOverride: kps

  crds:
    enabled: true

  # ---------------------------------------------------------------
  # Alertmanager — Slack #ops-alert + severity-based routing.
  #   * warning  -> Slack #ops-alert
  #   * critical -> Slack #ops-alert + Slack #incident + email (dual channel)
  # The Slack webhook and SMTP creds are placeholders here; in production they
  # are mounted from an ESO-managed Secret (see alertmanagerSpec note below) so
  # no secret material is committed to Git.
  # ---------------------------------------------------------------
  alertmanager:
    enabled: true
    config:
      global:
        resolve_timeout: 5m
        # Replace via ESO: a Secret key projected as slack_api_url_file is the
        # production-safe form. Inline placeholder kept so the config validates.
        slack_api_url: "https://hooks.slack.com/services/REPLACE_VIA_ESO"
        smtp_smarthost: "smtp.ktcloud.example.com:587"
        smtp_from: "alertmanager@ktcloud.example.com"
        smtp_require_tls: true
      route:
        group_by: ["alertname", "application", "namespace"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
        receiver: "slack-ops"
        routes:
          # critical -> dual channel (Slack #ops-alert + #incident) + email
          - matchers:
              - 'severity = "critical"'
            receiver: "critical-dual"
            continue: false
          # warning -> Slack #ops-alert only
          - matchers:
              - 'severity = "warning"'
            receiver: "slack-ops"
            continue: false
      receivers:
        - name: "slack-ops"
          slack_configs:
            - channel: "#ops-alert"
              send_resolved: true
              title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
              text: >-
                {{ range .Alerts }}*{{ .Labels.severity }}* {{ .Annotations.summary }}
                — {{ .Annotations.description }}
                {{ end }}
        - name: "critical-dual"
          slack_configs:
            - channel: "#ops-alert"
              send_resolved: true
              title: '[CRITICAL] {{ .CommonLabels.alertname }}'
              text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
            - channel: "#incident"
              send_resolved: true
              title: '[CRITICAL] {{ .CommonLabels.alertname }} — incident bridge'
              text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
          email_configs:
            - to: "oncall@ktcloud.example.com"
              send_resolved: true
      # Escalation: outside business hours, critical alerts repeat more
      # aggressively (handled by the shorter repeat_interval on this child route).
      templates:
        - "/etc/alertmanager/config/*.tmpl"

  # ---------------------------------------------------------------
  # Prometheus
  # ---------------------------------------------------------------
  prometheus:
    enabled: true
    prometheusSpec:
      retention: 7d
      retentionSize: "9GiB"

      # Pick up every ServiceMonitor / PodMonitor in the cluster regardless
      # of label, so Traefik, Istio, Kafka, etc. are scraped without us
      # adding chart-specific matchers.
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false
      probeSelectorNilUsesHelmValues: false
      scrapeConfigSelectorNilUsesHelmValues: false

      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 2Gi

      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: ebs-sc
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi

    service:
      type: ClusterIP

  # ---------------------------------------------------------------
  # Grafana — served under /grafana sub-path through Traefik
  # ---------------------------------------------------------------
  grafana:
    enabled: true
    fullnameOverride: grafana

    # Pinned to a static value so the chart's random-password helper
    # doesn't re-roll on every render and keep the app OutOfSync.
    # Replace with an ExternalSecret reference once SM has a grafana secret.
    adminPassword: "kt-cloud-grafana-admin"

    service:
      type: ClusterIP
      port: 80

    persistence:
      enabled: true
      storageClassName: ebs-sc
      size: 5Gi
      accessModes: ["ReadWriteOnce"]

    # Sub-path serving so http://<alb>/grafana works through Traefik
    # without a stripPrefix middleware. Grafana itself rewrites every
    # link / asset URL to include /grafana when serve_from_sub_path=true.
    grafana.ini:
      server:
        root_url: "%(protocol)s://%(domain)s/grafana"
        serve_from_sub_path: true
      analytics:
        check_for_updates: false
      log:
        mode: console

    sidecar:
      dashboards:
        enabled: true
        searchNamespace: ALL
      datasources:
        enabled: true
        defaultDatasourceEnabled: true

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

  # ---------------------------------------------------------------
  # kube-state-metrics / node-exporter (left default; cluster autoscaler,
  # kubelet, scheduler, controller-manager scrapes inherited from the
  # chart's defaults).
  # ---------------------------------------------------------------
  kube-state-metrics:
    resources:
      requests:
        cpu: 20m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 256Mi

  prometheus-node-exporter:
    resources:
      requests:
        cpu: 20m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi
