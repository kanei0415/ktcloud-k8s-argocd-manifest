apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ktcloud-market
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/`)
      kind: Rule
      priority: 1
      services:
        - name: {{ .Values.routing.app.serviceName }}
          namespace: {{ .Values.routing.app.namespace }}
          port: {{ .Values.routing.app.port }}
