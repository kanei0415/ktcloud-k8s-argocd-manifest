apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/argocd`)
      kind: Rule
      priority: 100
      services:
        - name: {{ .Values.routing.argocd.serviceName }}
          namespace: {{ .Values.routing.argocd.namespace }}
          port: {{ .Values.routing.argocd.port }}
