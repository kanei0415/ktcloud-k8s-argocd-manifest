---
# ResourceQuota for the application microservice namespace.
# Caps total workload resource consumption to prevent runaway pods from
# starving the cluster. Sized for 5 services × ~10 pods each at typical load.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: ktcloud-market-msa-quota
  namespace: ktcloud-market-msa
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    pods: "60"
---
# ResourceQuota for the monitoring namespace.
# Isolates kube-prometheus-stack resource consumption from application workloads
# so monitoring survives even under app-side resource pressure.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: monitoring-quota
  namespace: kube-prometheus-stack
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 10Gi
    limits.cpu: "8"
    limits.memory: 16Gi
---
# LimitRange for the application microservice namespace.
# Sets sane per-container defaults so services without explicit resource specs
# are still bounded. Prevents unbounded containers from hitting the quota ceiling unexpectedly.
apiVersion: v1
kind: LimitRange
metadata:
  name: ktcloud-market-msa-limits
  namespace: ktcloud-market-msa
spec:
  limits:
    - type: Container
      default:
        cpu: "1"
        memory: 1Gi
      defaultRequest:
        cpu: 100m
        memory: 256Mi
---
# LimitRange for the monitoring namespace.
# REQUIRED companion to monitoring-quota above: because that ResourceQuota
# constrains requests/limits for cpu+memory, the quota admission controller
# REJECTS any pod that does not declare them. Several kube-prometheus-stack
# components — notably the `kps-admission-create`/`-patch` webhook-certgen hook
# Jobs (upstream image sets no resources) — would otherwise be denied at pod
# creation, leaving the PreSync hook (and therefore the Operator CRDs) stuck
# forever. This LimitRange injects defaults so those pods satisfy the quota.
apiVersion: v1
kind: LimitRange
metadata:
  name: monitoring-limits
  namespace: kube-prometheus-stack
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 50m
        memory: 128Mi
