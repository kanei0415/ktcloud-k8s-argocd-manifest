{{- $lc := "{{" -}}
{{- $rc := "}}" -}}
---
# Operations Dashboard — error rate, P99 latency, throughput per service.
# Uses pre-computed recording rules for low query overhead.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ktcloud-ops-dashboard
  namespace: kube-prometheus-stack
  labels:
    grafana_dashboard: "1"
data:
  ktcloud-ops-dashboard.json: |
    {
      "id": null,
      "uid": "ktcloud-ops",
      "title": "KTCloud MSA — Operations",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "timezone": "browser",
      "tags": ["ktcloud", "operations"],
      "__inputs": [
        {
          "name": "DS_PROMETHEUS",
          "label": "Prometheus",
          "type": "datasource",
          "pluginId": "prometheus"
        }
      ],
      "__requires": [
        { "type": "datasource", "id": "prometheus", "name": "Prometheus", "version": "1.0.0" }
      ],
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Error Rate per Service (5m avg)",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "refId": "A",
              "expr": "service:http_error_rate:ratio5m",
              "legendFormat": "{{ $lc }}application{{ $rc }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.05 },
                  { "color": "red", "value": 0.10 }
                ]
              },
              "custom": { "thresholdsStyle": { "mode": "line" } }
            },
            "overrides": []
          }
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "P99 Latency per Service (5m)",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "refId": "A",
              "expr": "service:http_request_latency:p99_5m",
              "legendFormat": "{{ $lc }}application{{ $rc }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 2 }
                ]
              },
              "custom": { "thresholdsStyle": { "mode": "line" } }
            },
            "overrides": []
          }
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Request Throughput per Service (req/s, 5m rate)",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "refId": "A",
              "expr": "service:http_request_rate:rate5m",
              "legendFormat": "{{ $lc }}application{{ $rc }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Current Error Rate (all services)",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "refId": "A",
              "expr": "max(service:http_error_rate:ratio5m)",
              "legendFormat": "Max error rate"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "colorMode": "background"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.05 },
                  { "color": "red", "value": 0.10 }
                ]
              }
            },
            "overrides": []
          }
        }
      ]
    }
---
# Infrastructure Dashboard — CPU, memory, and network per container in the MSA namespace.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ktcloud-infra-dashboard
  namespace: kube-prometheus-stack
  labels:
    grafana_dashboard: "1"
data:
  ktcloud-infra-dashboard.json: |
    {
      "id": null,
      "uid": "ktcloud-infra",
      "title": "KTCloud MSA — Infrastructure",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "timezone": "browser",
      "tags": ["ktcloud", "infrastructure"],
      "__inputs": [
        {
          "name": "DS_PROMETHEUS",
          "label": "Prometheus",
          "type": "datasource",
          "pluginId": "prometheus"
        }
      ],
      "__requires": [
        { "type": "datasource", "id": "prometheus", "name": "Prometheus", "version": "1.0.0" }
      ],
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "CPU Usage per Container (5m rate)",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (pod, container) (rate(container_cpu_usage_seconds_total{namespace=\"ktcloud-market-msa\", container!=\"\", container!=\"POD\"}[5m]))",
              "legendFormat": "{{ $lc }}pod{{ $rc }} / {{ $lc }}container{{ $rc }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "cores",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.5 },
                  { "color": "red", "value": 0.9 }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Memory Working Set per Container",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (pod, container) (container_memory_working_set_bytes{namespace=\"ktcloud-market-msa\", container!=\"\", container!=\"POD\"})",
              "legendFormat": "{{ $lc }}pod{{ $rc }} / {{ $lc }}container{{ $rc }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 536870912 },
                  { "color": "red", "value": 1073741824 }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Network Receive Bytes (5m rate)",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (pod) (rate(container_network_receive_bytes_total{namespace=\"ktcloud-market-msa\"}[5m]))",
              "legendFormat": "{{ $lc }}pod{{ $rc }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Pod Restart Count (last 1h)",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (pod) (increase(kube_pod_container_status_restarts_total{namespace=\"ktcloud-market-msa\"}[1h]))",
              "legendFormat": "{{ $lc }}pod{{ $rc }}"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "colorMode": "background"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 3 }
                ]
              }
            },
            "overrides": []
          }
        }
      ]
    }
---
# Performance (Realtime) Dashboard — 1s refresh, 15m window, with deploy-event annotations.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ktcloud-perf-dashboard
  namespace: kube-prometheus-stack
  labels:
    grafana_dashboard: "1"
data:
  ktcloud-perf-dashboard.json: |
    {
      "id": null,
      "uid": "ktcloud-perf",
      "title": "KTCloud MSA — Performance (Realtime)",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "1s",
      "time": { "from": "now-15m", "to": "now" },
      "timezone": "browser",
      "tags": ["ktcloud", "performance", "realtime"],
      "__inputs": [
        {
          "name": "DS_PROMETHEUS",
          "label": "Prometheus",
          "type": "datasource",
          "pluginId": "prometheus"
        }
      ],
      "__requires": [
        { "type": "datasource", "id": "prometheus", "name": "Prometheus", "version": "1.0.0" }
      ],
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
            "enable": true,
            "expr": "changes(kube_deployment_status_observed_generation{namespace=\"ktcloud-market-msa\"}[2m]) > 0",
            "hide": false,
            "iconColor": "blue",
            "name": "Deployments",
            "step": "60s",
            "titleFormat": "Deploy: {{ $lc }}deployment{{ $rc }}",
            "type": "dashboard"
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Request Throughput (req/s)",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 7 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "refId": "A",
              "expr": "service:http_request_rate:rate5m",
              "legendFormat": "{{ $lc }}application{{ $rc }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "P99 Latency (s)",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 7 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "refId": "A",
              "expr": "service:http_request_latency:p99_5m",
              "legendFormat": "{{ $lc }}application{{ $rc }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 2 }
                ]
              },
              "custom": { "thresholdsStyle": { "mode": "line" } }
            },
            "overrides": []
          }
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Error Rate (ratio)",
          "gridPos": { "x": 0, "y": 7, "w": 12, "h": 7 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "refId": "A",
              "expr": "service:http_error_rate:ratio5m",
              "legendFormat": "{{ $lc }}application{{ $rc }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.05 },
                  { "color": "red", "value": 0.10 }
                ]
              },
              "custom": { "thresholdsStyle": { "mode": "line" } }
            },
            "overrides": []
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Max Error Rate Across Services",
          "gridPos": { "x": 12, "y": 7, "w": 12, "h": 7 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "refId": "A",
              "expr": "max(service:http_error_rate:ratio5m) or vector(0)",
              "legendFormat": "Max error rate"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "colorMode": "background",
            "graphMode": "area"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.05 },
                  { "color": "red", "value": 0.10 }
                ]
              }
            },
            "overrides": []
          }
        }
      ]
    }
