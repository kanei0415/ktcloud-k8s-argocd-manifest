kube-prometheus-stack:
  fullnameOverride: kps

  crds:
    enabled: true

  alertmanager:
    enabled: true
    config:
      global:
        resolve_timeout: 5m
        slack_api_url: "tmp"
      route:
        group_by: ["alertname", "application", "namespace"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
        receiver: "slack-ops"
        routes:
          - matchers:
              - 'severity = "critical"'
            receiver: "critical-dual"
            continue: false
          - matchers:
              - 'severity = "warning"'
            receiver: "slack-ops"
            continue: false
      receivers:
        - name: "slack-ops"
          slack_configs:
            - channel: "#ops-alert"
              api_url: "tmp"
              send_resolved: true
              title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
              text: >-
                {{ range .Alerts }}*{{ .Labels.severity }}* {{ .Annotations.summary }}
                — {{ .Annotations.description }}
                {{ end }}
        - name: "critical-dual"
          slack_configs:
            - channel: "#ops-alert"
              api_url: "tmp"
              send_resolved: true
              title: '[CRITICAL] {{ .CommonLabels.alertname }}'
              text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
            - channel: "#incident"
              api_url: "tmp"
              send_resolved: true
              title: '[CRITICAL] {{ .CommonLabels.alertname }} — incident bridge'
              text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
          email_configs:
            - to: "kimyoungho0415@gmail.com"
              send_resolved: true
      templates:
        - "/etc/alertmanager/config/*.tmpl"

  prometheus:
    enabled: true
    prometheusSpec:
      retention: 7d
      retentionSize: "9GiB"

      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false
      probeSelectorNilUsesHelmValues: false
      scrapeConfigSelectorNilUsesHelmValues: false

      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 2Gi

      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: ebs-sc
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi

    service:
      type: ClusterIP

  grafana:
    enabled: true
    fullnameOverride: grafana

    adminPassword: "kt-cloud-grafana-admin"

    service:
      type: ClusterIP
      port: 80

    persistence:
      enabled: true
      storageClassName: ebs-sc
      size: 5Gi
      accessModes: ["ReadWriteOnce"]

    grafana.ini:
      server:
        root_url: "%(protocol)s://%(domain)s/grafana"
        serve_from_sub_path: true
      analytics:
        check_for_updates: false
      log:
        mode: console

    sidecar:
      dashboards:
        enabled: true
        searchNamespace: ALL
      datasources:
        enabled: true
        defaultDatasourceEnabled: true

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

  kube-state-metrics:
    resources:
      requests:
        cpu: 20m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 256Mi

  prometheus-node-exporter:
    resources:
      requests:
        cpu: 20m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi
