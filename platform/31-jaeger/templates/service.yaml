---
# Collector service — receives traces from Istio sidecars and application pods
apiVersion: v1
kind: Service
metadata:
  name: jaeger-collector
  namespace: istio-system
  labels:
    app: jaeger
spec:
  type: ClusterIP
  selector:
    app: jaeger
  ports:
    - name: collector-http
      port: 14268
      targetPort: 14268
      protocol: TCP
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
    - name: zipkin
      port: 9411
      targetPort: 9411
      protocol: TCP
---
# Query / UI service — used by Kiali for trace integration
apiVersion: v1
kind: Service
metadata:
  name: jaeger-query
  namespace: istio-system
  labels:
    app: jaeger
spec:
  type: ClusterIP
  selector:
    app: jaeger
  ports:
    - name: query-ui
      port: 16686
      targetPort: 16686
      protocol: TCP
---
# Dedicated metrics service so Prometheus can scrape the admin endpoint
# without targeting the same port as the query UI.
apiVersion: v1
kind: Service
metadata:
  name: jaeger-metrics
  namespace: istio-system
  labels:
    app: jaeger
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "14269"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app: jaeger
  ports:
    - name: admin
      port: 14269
      targetPort: 14269
      protocol: TCP
