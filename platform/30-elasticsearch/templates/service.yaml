apiVersion: v1
kind: Service
metadata:
  name: elasticsearch-headless
  labels:
    app: elasticsearch
spec:
  clusterIP: None
  # Publish not-yet-ready pod IPs so the ES nodes can resolve each other via
  # discovery.seed_hosts=elasticsearch-headless DURING bootstrap. Without this a
  # headless service only returns READY endpoints, but a node isn't ready until
  # the cluster forms — a deadlock that left every node failing its
  # /_cluster/health liveness probe and CrashLooping.
  publishNotReadyAddresses: true
  selector:
    app: elasticsearch
  ports:
    - name: http
      port: 9200
      targetPort: 9200
    - name: transport
      port: 9300
      targetPort: 9300
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  labels:
    app: elasticsearch
spec:
  type: ClusterIP
  selector:
    app: elasticsearch
  ports:
    - name: http
      port: 9200
      targetPort: 9200
