apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-bff-prefix
  namespace: {{ .Release.Namespace }}
spec:
  stripPrefix:
    prefixes:
      - /ktcloud-msa/user-api
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-frontend-prefix
  namespace: {{ .Release.Namespace }}
spec:
  stripPrefix:
    prefixes:
      - /ktcloud-msa/user
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ktcloud-market
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - web
  routes:
    # BFF (user-api-gateway). Higher priority so /ktcloud-msa/user-api/* never
    # falls through to the frontend rule below. StripPrefix removes the
    # /ktcloud-msa/user-api segment so the gateway sees its native /api/v1/...
    # paths unchanged from local dev.
    - match: PathPrefix(`/ktcloud-msa/user-api`)
      kind: Rule
      priority: 200
      services:
        - name: {{ .Values.routing.bff.serviceName }}
          namespace: {{ .Values.routing.bff.namespace }}
          port: {{ .Values.routing.bff.port }}
      middlewares:
        - name: strip-bff-prefix
          namespace: {{ .Release.Namespace }}

    # Frontend SPA. StripPrefix removes /ktcloud-msa/user so nginx serves the
    # app at /. The Vite app must therefore be built with base: '/' (or have
    # its assets reachable at /assets/...), and the SPA router must handle
    # rewriting back to /ktcloud-msa/user/* on the client side if needed.
    - match: PathPrefix(`/ktcloud-msa/user`)
      kind: Rule
      priority: 100
      services:
        - name: {{ .Values.routing.frontend.serviceName }}
          namespace: {{ .Values.routing.frontend.namespace }}
          port: {{ .Values.routing.frontend.port }}
      middlewares:
        - name: strip-frontend-prefix
          namespace: {{ .Release.Namespace }}
