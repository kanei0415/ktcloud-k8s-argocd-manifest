apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/grafana`)
      kind: Rule
      priority: 100
      services:
        - name: {{ .Values.routing.grafana.serviceName }}
          namespace: {{ .Values.routing.grafana.namespace }}
          port: {{ .Values.routing.grafana.port }}
