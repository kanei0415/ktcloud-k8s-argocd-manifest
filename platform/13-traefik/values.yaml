traefik:
  deployment:
    kind: Deployment
    replicas: 2
    healthchecksPort: 8000

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: traefik
            topologyKey: topology.kubernetes.io/zone

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  ports:
    web:
      port: 8000
      expose:
        default: true
      exposedPort: 80
      protocol: TCP
    traefik:
      port: 9000
      expose:
        default: false
      protocol: TCP
    websecure:
      expose:
        default: false

  service:
    type: LoadBalancer
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
      service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
      service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"

  ping:
    enabled: true

  additionalArguments:
    - "--ping.entryPoint=web"
    - "--ping.terminatingStatusCode=503"

  ingressRoute:
    dashboard:
      enabled: true
      entryPoints: ["traefik"]
      matchRule: PathPrefix(`/dashboard`) || PathPrefix(`/api`)

  providers:
    kubernetesCRD:
      enabled: true
      allowCrossNamespace: true

    kubernetesIngress:
      enabled: false

  logs:
    general:
      level: INFO
    access:
      enabled: true
      format: json

  metrics:
    prometheus:
      service:
        enabled: true
      serviceMonitor:
        enabled: true
        namespace: kube-prometheus-stack
        namespaceSelector:
          any: true

  rbac:
    enabled: true

  ingressClass:
    enabled: false

routing:
  frontend:
    serviceName: ktcloud-msa-frontend-release
    namespace: ktcloud-market-msa
    port: 80

  bff:
    serviceName: ktcloud-msa-user-api-gateway-release
    namespace: ktcloud-market-msa
    port: 80

  argocd:
    serviceName: argocd-server
    namespace: argocd
    port: 80

  grafana:
    serviceName: grafana
    namespace: kube-prometheus-stack
    port: 80
