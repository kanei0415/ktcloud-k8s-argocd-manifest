apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform
  namespace: argocd
spec:
  generators:
  - list:
      elements:
      # Wave 0: storage layer + Istio CRDs (everything else may depend on these)
      - path: platform/05-aws-ebs-csi
        appname: aws-ebs-csi-driver
        ns: kube-system
        wave: "0"
      - path: platform/10-istio-base
        appname: istio-base
        ns: istio-system
        wave: "0"
      # Human-role RBAC (developer / operator / SRE) bound to cert O= groups.
      # Wave 0 so identities exist before any workload lands.
      - path: platform/60-rbac
        appname: rbac-human-roles
        ns: kube-system
        wave: "0"

      # Wave 1: control planes / operators that need CRDs from wave 0 (or bundle their own)
      - path: platform/11-istiod
        appname: istiod
        ns: istio-system
        wave: "1"
      - path: platform/40-external-secrets
        appname: external-secrets
        ns: external-secrets
        wave: "1"
      # CloudNativePG operator — owns the postgresql.cnpg.io CRDs the per-service
      # Cluster CRs (rendered by the msa-chart) depend on.
      - path: platform/40-cnpg-operator
        appname: cnpg-operator
        ns: cnpg-system
        wave: "1"
      - path: platform/20-cluster-autoscaler
        appname: cluster-autoscaler
        ns: kube-system
        wave: "1"
      - path: platform/40-kafka-operator
        appname: kafka
        ns: kafka
        wave: "1"
      - path: platform/50-kafka-cluster
        appname: kafka-cluster
        ns: kafka
        wave: "2"
      - path: platform/30-kube-prometheus-stack
        appname: kube-prometheus-stack
        ns: kube-prometheus-stack
        wave: "1"
      # Self-hosted SonarQube (SAST + coverage quality gate) — reached via
      # port-forward; CI calls it through the reusable workflow in the values repo.
      - path: platform/30-sonarqube
        appname: sonarqube
        ns: sonarqube
        wave: "1"

      # Wave 2: edge (ALB-fronted ingress). Traefik depends on the
      # ServiceMonitor CRD from kube-prometheus-stack (wave 1).
      - path: platform/13-traefik
        appname: traefik
        ns: traefik
        wave: "2"

      # ---------------------------------------------------------------------
      # Wave 1: operators / controllers that own CRDs the later waves consume.
      # (SkipDryRunOnMissingResource + selfHeal retry until their CRDs exist,
      #  so strict ordering across these Applications is best-effort.)
      # ---------------------------------------------------------------------
      - path: platform/40-keda
        appname: keda
        ns: keda
        wave: "1"
      - path: platform/40-argo-rollouts
        appname: argo-rollouts
        ns: argo-rollouts
        wave: "1"
      - path: platform/40-gatekeeper
        appname: gatekeeper
        ns: gatekeeper-system
        wave: "1"
      - path: platform/40-falco
        appname: falco
        ns: falco
        wave: "1"
      - path: platform/40-chaos-mesh
        appname: chaos-mesh
        ns: chaos-mesh
        wave: "1"

      # Wave 1: EFK data plane root (Elasticsearch must exist before Kibana /
      # Logstash / Fluent Bit / the lifecycle Job point at it).
      - path: platform/30-elasticsearch
        appname: elasticsearch
        ns: logging
        wave: "1"

      # Wave 2: logging consumers + mesh observability + monitoring config.
      - path: platform/31-logstash
        appname: logstash
        ns: logging
        wave: "2"
      - path: platform/31-kibana
        appname: kibana
        ns: logging
        wave: "2"
      - path: platform/31-fluent-bit
        appname: fluent-bit
        ns: logging
        wave: "2"
      - path: platform/31-kiali
        appname: kiali
        ns: istio-system
        wave: "2"
      - path: platform/31-jaeger
        appname: jaeger
        ns: istio-system
        wave: "2"
      - path: platform/31-monitoring-config
        appname: monitoring-config
        ns: kube-prometheus-stack
        wave: "2"

      # Wave 3: resources that depend on a wave-1/2 control plane being up
      # (Gatekeeper CRDs, Chaos Mesh CRDs, a live Elasticsearch).
      - path: platform/91-es-lifecycle
        appname: es-lifecycle
        ns: logging
        wave: "3"
      - path: platform/91-gatekeeper-policies
        appname: gatekeeper-policies
        ns: gatekeeper-system
        wave: "3"
      - path: platform/91-chaos-experiments
        appname: chaos-experiments
        ns: ktcloud-market-msa
        wave: "3"
      - path: platform/91-perf-k6
        appname: perf-k6
        ns: ktcloud-market-msa
        wave: "3"
  template:
    metadata:
      name: '{{appname}}'
      annotations:
        argocd.argoproj.io/sync-wave: '{{wave}}'
    spec:
      project: platform
      source:
        repoURL: "https://github.com/kanei0415/ktcloud-k8s-argocd-manifest.git"
        targetRevision: HEAD
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ns}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - SkipDryRunOnMissingResource=true
          - ServerSideApply=true
      # istiod re-writes failurePolicy on its own webhooks at runtime, which
      # otherwise leaves istio-base / istiod permanently OutOfSync. The istiod
      # Deployment also renders a PLATFORM env with value:"" that the
      # apiserver strips on apply, producing perpetual drift.
      ignoreDifferences:
        - group: admissionregistration.k8s.io
          kind: ValidatingWebhookConfiguration
          jqPathExpressions:
            - '.webhooks[]?.failurePolicy'
        - group: apps
          kind: Deployment
          name: istiod
          namespace: istio-system
          # K8s strips env.value="" on apply, leaving the chart-rendered
          # PLATFORM entry permanently OutOfSync. Ignore the entire env array.
          jsonPointers:
            - /spec/template/spec/containers/0/env
