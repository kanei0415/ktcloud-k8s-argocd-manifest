apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: projects
  namespace: argocd
  annotations:
    # Created before everything else so the platform/market AppProjects exist
    # by the time the platform & application ApplicationSets reference them.
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: default
  source:
    repoURL: "https://github.com/kanei0415/ktcloud-k8s-argocd-manifest.git"
    targetRevision: HEAD
    path: projects
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
