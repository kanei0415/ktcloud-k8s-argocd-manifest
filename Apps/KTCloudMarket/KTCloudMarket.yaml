apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: ktcloud-market-applications
  namespace: argocd
spec:
  generators:
    - list:
       elements:
        - app: ktcloud-msa-auth-service
          environment: release
          revision: HEAD
          ns: ktcloud-market-msa

        - app: ktcloud-msa-inventory-service
          environment: release
          revision: HEAD
          ns: ktcloud-market-msa

        - app: ktcloud-msa-order-service
          environment: release
          revision: HEAD
          ns: ktcloud-market-msa

        - app: ktcloud-msa-product-service
          environment: release
          revision: HEAD
          ns: ktcloud-market-msa

        - app: ktcloud-msa-user-api-gateway
          environment: release
          revision: HEAD
          ns: ktcloud-market-msa
  template:
    metadata:
      name: '{{ app }}-{{ environment }}'
    spec:
      project: default
      sources:
        - repoURL: https://github.com/ktcloud-msa/ktcloud-msa-chart.git
          targetRevision: '{{ revision }}'
          path: '.'
          ref: template
          helm:
            valueFiles:
              - '$values/{{ app }}/values-{{ environment }}.yaml'
        - repoURL: 'https://github.com/ktcloud-msa/ktcloud-msa-values.git'
          targetRevision: '{{ revision }}'
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ ns }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        managedNamespaceMetadata:
          labels:
            istio-injection: enabled
        syncOptions:
          - CreateNamespace=true
          - SkipDryRunOnMissingResource=true
          - ServerSideApply=true
      # ESO's admission webhook defaults conversionStrategy/decodingStrategy/
      # metadataPolicy/deletionPolicy on the live ExternalSecret, which the
      # static chart render doesn't include — these show as drift forever.
      ignoreDifferences:
        - group: external-secrets.io
          kind: ExternalSecret
          jqPathExpressions:
            - '.spec.data[].remoteRef.conversionStrategy'
            - '.spec.data[].remoteRef.decodingStrategy'
            - '.spec.data[].remoteRef.metadataPolicy'
            - '.spec.dataFrom[].extract.conversionStrategy'
            - '.spec.dataFrom[].extract.decodingStrategy'
            - '.spec.dataFrom[].extract.metadataPolicy'
            - '.spec.target.deletionPolicy'