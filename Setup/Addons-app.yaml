apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: addons-app
  namespace: argocd
spec:
  generators:
  - list:
      elements:
      # Wave 0: storage layer + Istio CRDs (everything else may depend on these)
      - path: Addons/AwsEbsCsi
        appname: aws-ebs-csi-driver
        ns: kube-system
        wave: "0"
      - path: Addons/Istio/Base
        appname: istio-base
        ns: istio-system
        wave: "0"

      # Wave 1: control planes / operators that need CRDs from wave 0 (or bundle their own)
      - path: Addons/Istio/Istiod
        appname: istiod
        ns: istio-system
        wave: "1"
      - path: Addons/ExternalSecrets
        appname: external-secrets
        ns: external-secrets
        wave: "1"
      - path: Addons/ClusterAutoscaler
        appname: cluster-autoscaler
        ns: kube-system
        wave: "1"
      - path: Addons/Kafka
        appname: kafka
        ns: kafka
        wave: "1"
      - path: Addons/KafkaCluster
        appname: kafka-cluster
        ns: kafka
        wave: "2"
      - path: Addons/KubePrometheusStack
        appname: kube-prometheus-stack
        ns: kube-prometheus-stack
        wave: "1"

      # Wave 2: edge (ALB-fronted ingress). Traefik depends on the
      # ServiceMonitor CRD from kube-prometheus-stack (wave 1).
      - path: Addons/Traefik
        appname: traefik
        ns: traefik
        wave: "2"
  template:
    metadata:
      name: '{{appname}}'
      annotations:
        argocd.argoproj.io/sync-wave: '{{wave}}'
    spec:
      project: default
      source:
        repoURL: "https://github.com/kanei0415/ktcloud-k8s-argocd-manifest.git"
        targetRevision: HEAD
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ns}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - SkipDryRunOnMissingResource=true
          - ServerSideApply=true
      # istiod re-writes failurePolicy on its own webhooks at runtime, which
      # otherwise leaves istio-base / istiod permanently OutOfSync. The istiod
      # Deployment also renders a PLATFORM env with value:"" that the
      # apiserver strips on apply, producing perpetual drift.
      ignoreDifferences:
        - group: admissionregistration.k8s.io
          kind: ValidatingWebhookConfiguration
          jqPathExpressions:
            - '.webhooks[]?.failurePolicy'
        - group: apps
          kind: Deployment
          name: istiod
          namespace: istio-system
          jqPathExpressions:
            - '.spec.template.spec.containers[0].env[] | select(.name == "PLATFORM")'
